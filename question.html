<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أرسل سؤالك</title>

<style>

body{
margin:0;
padding:25px;
font-family:'Cairo',sans-serif;
background:#fff;
color:#333;
}

.container{
max-width:700px;
margin:auto;
}

h2{

text-align:center;
color:#0A58CA;
font-size:34px;
font-weight:800;
margin-bottom:30px;

}
label{
display:block;
margin-top:18px;
margin-bottom:8px;
font-weight:bold;
color:#8BAF00;
font-size:20px;
}

input,
textarea{

width:100%;
padding:14px;
font-size:18px;

background:#F2F4F7;

border:2px solid #BFC7D1;

border-radius:12px;

color:#222;

box-sizing:border-box;

transition:.3s;

}
input:focus,
textarea:focus{

background:#FFFFFF;

border-color:#0A58CA;

outline:none;

box-shadow:0 0 10px rgba(10,88,202,.25);

}
textarea{

height:180px;
resize:vertical;

}

button{

margin-top:25px;
width:100%;
padding:16px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:14px;
background:#25D366;
color:#fff;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#1EBE5D;

}

</style>

</head>

<body>

<div class="container">

<h2>أرسل سؤالك</h2>

<label>الاسم</label>
<input
type="text"
id="name"
placeholder="اكتب اسمك">

<label>رقم الهاتف</label>
<input
type="tel"
id="phone"
placeholder="05xxxxxxxx">

<label>سؤالك</label>
<textarea
id="question"
placeholder="اكتب سؤالك هنا"></textarea>

<button onclick="sendWhatsApp()">
إرسال عبر واتساب
</button>

</div>

<script>

function sendWhatsApp(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let question=document.getElementById("question").value.trim();

if(name==="" || phone==="" || question===""){

alert("يرجى تعبئة جميع الحقول أولاً.");

return;

}

let text=
"السلام عليكم 👋%0A%0A"+
"الاسم: "+encodeURIComponent(name)+"%0A"+
"رقم الهاتف: "+encodeURIComponent(phone)+"%0A%0A"+
"السؤال:%0A"+encodeURIComponent(question);

window.open("https://wa.me/905319667732?text="+text,"_blank");

}

</script>

</body>

</html>
