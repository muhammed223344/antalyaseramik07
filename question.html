<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أرسل سؤالك</title>

<style>

body{
margin:0;
padding:25px;
font-family:'Cairo',sans-serif;
background:#fff;
color:#333;
}

.container{
max-width:700px;
margin:auto;
}

h2{
text-align:center;
color:#0A58CA;
margin-bottom:30px;
}

label{
display:block;
margin-top:18px;
margin-bottom:8px;
font-weight:bold;
color:#8BAF00;
font-size:20px;
}

input,
textarea{

width:100%;
padding:14px;
font-size:18px;
border:1px solid #ddd;
border-radius:12px;
box-sizing:border-box;

}

textarea{

height:180px;
resize:vertical;

}

button{

margin-top:25px;
width:100%;
padding:16px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:14px;
background:#25D366;
color:#fff;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#1EBE5D;

}

</style>

</head>

<body>

<div class="container">

<h2>أرسل سؤالك</h2>

<label>الاسم</label>
<input
type="text"
id="name"
placeholder="اكتب اسمك">

<label>رقم الهاتف</label>
<input
type="tel"
id="phone"
placeholder="05xxxxxxxx">

<label>سؤالك</label>
<textarea
id="question"
placeholder="اكتب سؤالك هنا"></textarea>

<button onclick="sendWhatsApp()">
إرسال عبر واتساب
</button>

</div>

<script>

function sendWhatsApp(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let question=document.getElementById("question").value.trim();

if(name==="" || phone==="" || question===""){

alert("يرجى تعبئة جميع الحقول أولاً.");

return;

}

let text=
"السلام عليكم 👋%0A%0A"+
"الاسم: "+encodeURIComponent(name)+"%0A"+
"رقم الهاتف: "+encodeURIComponent(phone)+"%0A%0A"+
"السؤال:%0A"+encodeURIComponent(question);

window.open("https://wa.me/905319667732?text="+text,"_blank");

}

</script>

</body>

</html>
